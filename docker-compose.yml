name: datn
services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Bus_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: ./Backend
    container_name: backend_service
    restart: always
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start"
    env_file:
      - ./Backend/.env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
  
  frontend:
    build: ./Frontend
    container_name: frontend_service
    restart: always
    env_file:
      - ./Frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
  mqtt-worker:
    build: ./Mqtt-worker
    container_name: mqtt_worker
    restart: always
    env_file:
      - ./Mqtt-worker/.env
    depends_on:
      - backend
volumes:
  postgres_data:
    name: datn_postgres_data